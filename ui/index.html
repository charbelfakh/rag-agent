    function appendCitationMedia(content, citations) {
      if (!content) return;

      const imageCites = (citations || []).filter(function (c) {
        return citationImageSrc(c);
      });
      if (!imageCites.length) return;

      const prior = content.querySelector(".citation-media-root");
      if (prior) prior.remove();

      const root = document.createElement("div");
      root.className = "citation-media-root";

      const row = document.createElement("div");
      row.className = "citation-thumbs";
      imageCites.slice(0, 4).forEach(function (citation) {
        const wrap = document.createElement("div");
        wrap.className = "citation-thumb-wrap";
        const img = document.createElement("img");
        img.className = "citation-thumb";
        img.alt = formatCitationLabel(citation);
        img.loading = "lazy";
        img.decoding = "async";
        const src = citationImageSrc(citation);
        img.addEventListener("click", function (event) {
          event.stopPropagation();
          openImageLightbox(src, img.alt);
        });
        img.addEventListener("error", function () {
          wrap.remove();
          if (!row.childElementCount) row.remove();
        });
        wrap.appendChild(img);
        if (citation.content_type === "image_caption") {
          const label = document.createElement("div");
          label.className = "citation-thumb-label";
          label.textContent = formatCitationLabel(citation);
          wrap.appendChild(label);
        }
        img.src = src;
        row.appendChild(wrap);
      });
      if (!row.childElementCount) return;
      root.appendChild(row);

      const bubble = content.querySelector(".bubble");
      if (bubble && bubble.parentNode === content) {
        content.insertBefore(root, bubble.nextSibling);
      } else {
        content.appendChild(root);
      }
    }

    function applyMessageCitations(content, citations) {
      if (!content || !citations || !citations.length) return;
      appendCitationMedia(content, citations);
      let citesEl = content.querySelector(".citations");
      if (!citesEl) {
        citesEl = document.createElement("div");
        citesEl.className = "citations";
      }
      setCitationsContent(citesEl, citations);
      const mediaRoot = content.querySelector(".citation-media-root");
      if (mediaRoot) {
        if (mediaRoot.nextSibling !== citesEl) {
          content.insertBefore(citesEl, mediaRoot.nextSibling);
        }
      } else {
        const bubble = content.querySelector(".bubble");
        if (bubble && bubble.nextSibling !== citesEl) {
          content.insertBefore(citesEl, bubble.nextSibling);
        } else if (!citesEl.parentNode) {
          content.appendChild(citesEl);
        }
      }
    }

    function runCitationYoutubeUnitTest() {
      const errors = [];
      const youtubeCitation = {
        content_type: "video_transcript",
        source: "Bin Picking Demo",
        youtube_url: "https://www.youtube.com/watch?v=abc123&t=90s",
        video_id: "abc123",
        start_seconds: 90,
        text: "Robot picks parts from the bin.",
      };
      const localCitation = {
        content_type: "video_transcript",
        source: "data/pekat/videos/demo/source.mp4",
        video_url: "/video?path=data/pekat/videos/demo/source.mp4",
        text: "Local clip transcript.",
      };
      const pdfCitation = {
        content_type: "text",
        source: "docs/pekat/manual.pdf",
        file_name: "manual.pdf",
        page: 2,
        vendor: "pekat",
      };

      if (!isYoutubeVideoCitation(youtubeCitation)) {
        errors.push("YouTube citation not detected");
      }
      if (!isLocalVideoCitation(localCitation)) {
        errors.push("local video citation not detected");
      }
      if (isYoutubeVideoCitation(localCitation)) {
        errors.push("local citation mistaken for YouTube");
      }

      const listHost = document.createElement("div");
      listHost.className = "citations";
      setCitationsContent(listHost, [youtubeCitation, pdfCitation]);
      const link = listHost.querySelector("a.citation-youtube-link");
      if (!link) {
        errors.push("citations list missing YouTube link");
      } else {
        if (!String(link.href).includes("abc123")) {
          errors.push("YouTube link href mismatch: " + link.href);
        }
        if (link.textContent !== youtubeCitationTitle(youtubeCitation)) {
          errors.push("YouTube link label mismatch");
        }
        if (link.target !== "_blank") {
          errors.push("YouTube link should open in new tab");
        }
      }
      if (!listHost.querySelector(".citation-players iframe.citation-youtube-embed")) {
        errors.push("citations block missing inline YouTube player");
      }
      const pdfText = listHost.textContent || "";
      if (!pdfText.includes("manual.pdf")) {
        errors.push("PDF citation missing from list");
      }

      const youtubeBlock = createYoutubeCitationElement(youtubeCitation);
      if (youtubeBlock.querySelector("video")) {
        errors.push("YouTube block must not use <video>");
      }
      if (!youtubeBlock.querySelector("iframe.citation-youtube-embed")) {
        errors.push("YouTube block missing embed iframe");
      }
      const iframe = youtubeBlock.querySelector("iframe.citation-youtube-embed");
      if (!iframe || !String(iframe.src).includes("start=90")) {
        errors.push("YouTube embed missing start timestamp");
      }
      if (!iframe || !String(iframe.src).includes("youtube-nocookie.com")) {
        errors.push("YouTube embed should use privacy-enhanced domain");
      }
      const blockLink = youtubeBlock.querySelector("a.citation-youtube-link");
      if (!blockLink || !String(blockLink.href).includes("abc123")) {
        errors.push("YouTube media block missing watch link");
      }

      const localBlock = createVideoCitationElement(localCitation);
      if (!localBlock.querySelector("video.citation-video")) {
        errors.push("local citation missing <video> player");
      }
      if (localBlock.querySelector("iframe")) {
        errors.push("local citation must not use YouTube iframe");
      }

      return { ok: errors.length === 0, errors: errors };
    }

    window.__ragRunCitationYoutubeUnitTest = runCitationYoutubeUnitTest;

    function createMessageElement(role, text, citations, meta, msg) {
      const wrapper = document.createElement("div");
      wrapper.className = "message " + role;

      const content = document.createElement("div");
      content.className = "message-content";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      if (role === "assistant" && isMarkdownRenderingEnabled()) {
        bubble.innerHTML = renderMarkdown(text);
      } else {
        bubble.textContent = text;
      }
      content.appendChild(bubble);

      if (role === "assistant" && citations && citations.length > 0) {
        applyMessageCitations(content, citations);
      }

      const metaText = formatQueryMeta(meta);
      if (role === "assistant" && metaText) {
        const metaEl = document.createElement("div");
        metaEl.className = "query-meta";
        metaEl.textContent = metaText;
        content.appendChild(metaEl);
      }

      if (role === "assistant" && msg) {
        attachFeedbackControls(content, msg);
      }

      wrapper.appendChild(content);
      return wrapper;
    }

    function createTypingIndicator() {
      const wrapper = document.createElement("div");
      wrapper.className = "message assistant typing";
      wrapper.id = "typingIndicator";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML =
        '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';

      wrapper.appendChild(bubble);
      return wrapper;
    }

    function removeTypingIndicator() {
      const indicator = document.getElementById("typingIndicator");
      if (indicator) indicator.remove();
    }

    function renderChat() {
      chatInner.innerHTML = "";
      const conv = getActiveConversation();

      if (!conv || conv.messages.length === 0) {
        chatInner.appendChild(renderWelcome());
        return;
      }

      for (const msg of conv.messages) {
        chatInner.appendChild(
          createMessageElement(msg.role, msg.text, msg.citations, msg.meta, msg)
        );
      }
    }

    function switchConversation(id) {
      if (isLoading) return;
      activeConversationId = id;
      renderChat();
      renderHistoryList();
      scrollToBottom();
      input.focus();
    }

    function startNewChat() {
      if (isLoading) return;
      cancelStreamingTts();
      createConversation();
      renderChat();
      renderHistoryList();
      input.focus();
    }

    function autoResize() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 160) + "px";
    }

    function scrollToBottom() {
      chat.scrollTop = chat.scrollHeight;
    }

    function setLoading(loading) {
      setGenerating(loading);
    }

    function formatDuration(seconds) {
      if (seconds == null || isNaN(seconds)) return "—";
      const s = Math.max(0, Math.floor(seconds));
      const m = Math.floor(s / 60);
      const r = s % 60;
      if (m > 0) return m + "m " + r + "s";
      return r + "s";
    }

    function ingestStageLabel(stage) {
      const labels = {
        reading: "Reading",
        embedding: "Embedding",
        storing: "Storing",
      };
      return labels[stage] || stage;
    }

    function openDocumentsPanel() {
      if (!documentsOpen) {
        documentsOpen = true;
        documentsPanel.classList.add("open");
        documentsBody.hidden = false;
        if (!documentsLoaded) {
          loadDocuments();
        }
      }
    }

    function createIngestProgressCard(jobId, filename) {
      const card = document.createElement("div");
      card.className = "ingest-progress-card ingesting";
      card.dataset.jobId = jobId;

      const nameEl = document.createElement("div");
      nameEl.className = "ingest-progress-filename";
      nameEl.textContent = filename;
      nameEl.title = filename;

      const stageEl = document.createElement("div");
      stageEl.className = "ingest-progress-stage";
      stageEl.textContent = "Reading…";

      const barWrap = document.createElement("div");
      barWrap.className = "ingest-progress-bar-wrap";
      const bar = document.createElement("div");
      bar.className = "ingest-progress-bar";
      barWrap.appendChild(bar);

      const meta = document.createElement("div");
      meta.className = "ingest-progress-meta";
      const countEl = document.createElement("span");
      countEl.className = "ingest-progress-count";
      countEl.textContent = "0 / — chunks";
      const timeEl = document.createElement("span");
      timeEl.className = "ingest-progress-time";
      timeEl.textContent = "0s elapsed · — remaining";
      meta.appendChild(countEl);
      meta.appendChild(timeEl);

      const footer = document.createElement("div");
      footer.className = "ingest-progress-footer";

      card.appendChild(nameEl);
      card.appendChild(stageEl);
      card.appendChild(barWrap);
      card.appendChild(meta);
      card.appendChild(footer);

      card._refs = { stageEl, bar, countEl, timeEl, footer };
      ingestProgressList.prepend(card);
      return card;
    }

    function updateIngestProgressCard(card, status) {
      const refs = card._refs;
      if (!refs) return;

      const total = status.chunks_total || 0;
      const done = status.chunks_done || 0;
      const pct =
        total > 0 ? Math.min(100, Math.round((done / total) * 100)) : 0;

      refs.bar.style.width = pct + "%";
      refs.countEl.textContent =
        done.toLocaleString() +
        " / " +
        (total > 0 ? total.toLocaleString() : "—") +
        " chunks";
      refs.timeEl.textContent =
        formatDuration(status.elapsed_seconds) +
        " elapsed · " +
        (status.status === "ingesting" && total > done && done > 0
          ? formatDuration(status.estimated_remaining_seconds) + " remaining"
          : status.status === "done"
            ? "complete"
            : "— remaining");

      if (status.status === "ingesting") {
        card.className = "ingest-progress-card ingesting";
        refs.stageEl.textContent = ingestStageLabel(status.stage) + "…";
        refs.footer.textContent = "";
        refs.footer.className = "ingest-progress-footer";
      } else if (status.status === "done") {
        card.className = "ingest-progress-card done";
        refs.stageEl.textContent = "Complete";
        refs.bar.style.width = "100%";
        refs.footer.className = "ingest-progress-success";
        refs.footer.textContent =
          status.filename +
          " ready — " +
          (status.chunks_done || 0).toLocaleString() +
          " chunks ingested";
      } else if (status.status === "error") {
        card.className = "ingest-progress-card error";
        refs.stageEl.textContent = "Failed";
        refs.footer.className = "ingest-progress-error";
        refs.footer.textContent = status.error || "Ingest failed";
      }
    }

    function stopIngestPolling(jobId) {
      const poll = activeIngestPolls.get(jobId);
      if (poll) {
        clearInterval(poll.intervalId);
        activeIngestPolls.delete(jobId);
      }
    }

    async function pollIngestStatus(jobId, card) {
      try {
        const response = await apiFetch(INGEST_STATUS_URL + encodeURIComponent(jobId));
        if (response.status === 404) {
          stopIngestPolling(jobId);
          updateIngestProgressCard(card, {
            status: "error",
            error: "Job not found — the server may have restarted.",
            filename: card.querySelector(".ingest-progress-filename")?.textContent,
          });
          return;
        }
        if (!response.ok) return;

        const status = await response.json();
        updateIngestProgressCard(card, status);

        if (status.status === "done") {
          stopIngestPolling(jobId);
          loadDocuments();
        } else if (status.status === "error") {
          stopIngestPolling(jobId);
        }
      } catch (_) {}
    }

    function startIngestPolling(jobId, filename) {
      openDocumentsPanel();
      const card = createIngestProgressCard(jobId, filename);
      pollIngestStatus(jobId, card);
      const intervalId = setInterval(() => {
        pollIngestStatus(jobId, card);
      }, 2000);
      activeIngestPolls.set(jobId, { intervalId, card });
    }

    function ensureConversation() {
      let conv = getActiveConversation();
      if (!conv) {
        conv = createConversation();
      }
      return conv;
    }

    function addChatMessage(role, text) {
      const conv = ensureConversation();
      conv.messages.push({ role, text });
      renderChat();
      scrollToBottom();
      return conv;
    }

    function buildRequestHistory(messages) {
      return messages
        .filter((m) => m.role === "user" || m.role === "assistant")
        .map((m) => ({ role: m.role, content: m.text }));
    }

    async function sendMessage(text) {
      const question = text.trim();
      if (!question || isLoading) return;

      cancelStreamingTts();

      let conv = getActiveConversation();
      if (!conv) {
        conv = createConversation();
      }

      const isFirstMessage = conv.messages.length === 0;
      if (isFirstMessage) {
        conv.title = truncateTitle(question);
        conv.timestamp = new Date();
      }

      const history = buildRequestHistory(conv.messages);

      conv.messages.push({ role: "user", text: question });
      renderChat();
      renderHistoryList();
      chatInner.appendChild(createTypingIndicator());
      scrollToBottom();

      input.value = "";
      autoResize();
      activeAbortController = new AbortController();
      setGenerating(true);

      const assistantMsg = {
        role: "assistant",
        text: "",
        citations: [],
        meta: null,
        question: question,
      };
      let streamElement = null;
      let streamBubble = null;
      let streamCites = null;
      let streamMeta = null;
      let streamingStarted = false;
      let ttsSession = null;

      function ensureStreamMessage() {
        if (streamingStarted) return;
        streamingStarted = true;
        removeTypingIndicator();
        conv.messages.push(assistantMsg);
        streamElement = createMessageElement("assistant", "", []);
        streamBubble = streamElement.querySelector(".bubble");
        streamCites = streamElement.querySelector(".citations");
        streamBubble.classList.add("streaming");
        chatInner.appendChild(streamElement);
        if (ttsEnabled) {
          ttsSession = createStreamingTtsSession();
        }
      }

      function finishStreamMessage(citations, meta) {
        if (streamBubble) {
          streamBubble.classList.remove("streaming");
        }
        assistantMsg.citations = Array.isArray(citations) ? citations : [];
        assistantMsg.meta = meta || null;
        if (
          assistantMsg.citations.length > 0 &&
          !assistantMsg.text.trim() &&
          meta &&
          meta.answer_outcome &&
          meta.answer_outcome !== "ok"
        ) {
          assistantMsg.text =
            "Answer generation failed. Sources are shown below — please try again.";
          if (streamBubble) {
            streamBubble.textContent = assistantMsg.text;
          }
        }
        if (streamElement && assistantMsg.citations.length > 0) {
          const contentEl = streamElement.querySelector(".message-content");
          if (contentEl) {
            if (streamBubble && isMarkdownRenderingEnabled()) {
              streamBubble.innerHTML = renderMarkdown(assistantMsg.text);
            }
            applyMessageCitations(contentEl, assistantMsg.citations);
            if (
              isDevMode() &&
              meta &&
              meta.youtube_citations > 0 &&
              !contentEl.querySelector("iframe.citation-youtube-embed")
            ) {
              console.warn(
                "Expected " +
                  meta.youtube_citations +
                  " YouTube player(s) but none rendered. Hard-refresh the page (Ctrl+Shift+R)."
              );
            }
          }
        }
        const metaText = formatQueryMeta(assistantMsg.meta);
        if (streamElement && metaText) {
          if (streamMeta) {
            streamMeta.textContent = metaText;
          } else {
            streamMeta = document.createElement("div");
            streamMeta.className = "query-meta";
            streamMeta.textContent = metaText;
            streamElement.querySelector(".message-content").appendChild(streamMeta);
          }
        } else if (streamMeta) {
          streamMeta.remove();
          streamMeta = null;
        }
        if (streamElement) {
          attachFeedbackControls(
            streamElement.querySelector(".message-content"),
            assistantMsg
          );
        }
      }

      try {
        const response = await apiFetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(
            Object.assign(
              {
                question,
                top_k: 10,
                history,
              },
              buildQueryFilterBody()
            )
          ),
          signal: activeAbortController.signal,
        });

        if (!response.ok) {
          removeTypingIndicator();
          let detail = "Request failed (" + response.status + ")";
          try {
            const err = await response.json();
            detail = err.detail || detail;
          } catch (_) {}
          conv.messages.push({ role: "error", text: detail });
        } else if (!response.body) {
          removeTypingIndicator();
          conv.messages.push({
            role: "error",
            text: "Streaming is not supported by this browser.",
          });
        } else {
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          function processSseChunk(chunk) {
            if (!chunk) return;
            const line = chunk.trim();
            if (!line.startsWith("data: ")) return;

            let data;
            try {
              data = JSON.parse(line.slice(6));
            } catch (_) {
              return;
            }

            if (data.stage === "retrieval_complete") {
              return;
            }

            if ("token" in data && data.token != null) {
              ensureStreamMessage();
              assistantMsg.text += data.token;
              streamBubble.textContent = assistantMsg.text;
              if (ttsSession) {
                ttsSession.feed(data.token);
              }
              scrollToBottom();
            }

            if (data.done) {
              ensureStreamMessage();
              if (ttsSession) {
                ttsSession.flush();
                ttsSession = null;
              }
              finishStreamMessage(data.citations || [], data.meta || null);
              if (data.error) {
                assistantMsg.text +=
                  assistantMsg.text ? "\n\n" : "";
                assistantMsg.text += "[Error: " + data.error + "]";
                if (streamBubble) {
                  streamBubble.textContent = assistantMsg.text;
                }
              }
            }
          }

          function processSseBuffer(text) {
            const parts = text.split("\n\n");
            const remainder = parts.pop() || "";
            for (const part of parts) {
              processSseChunk(part);
            }
            return remainder;
          }

          while (true) {
            const { done, value } = await reader.read();
            if (value) {
              buffer += decoder.decode(value, { stream: true });
              buffer = processSseBuffer(buffer);
            }
            if (done) {
              buffer += decoder.decode(undefined, { stream: false });
              processSseBuffer(buffer + "\n\n");
              break;
            }
          }

          if (!streamingStarted) {
            removeTypingIndicator();
            conv.messages.push({
              role: "assistant",
              text: "No answer returned.",
              citations: [],
            });
          }
        }
      } catch (error) {
        removeTypingIndicator();
        if (ttsSession) {
          cancelStreamingTts();
          ttsSession = null;
        }
        if (error.name === "AbortError") {
          if (streamingStarted && streamBubble) {
            streamBubble.classList.remove("streaming");
            const suffix = "\n\n[Generation stopped]";
            assistantMsg.text = assistantMsg.text
              ? assistantMsg.text + suffix
              : "[Generation stopped]";
            streamBubble.textContent = assistantMsg.text;
          }
        } else if (streamingStarted && streamBubble) {
          streamBubble.classList.remove("streaming");
          assistantMsg.text +=
            (assistantMsg.text ? "\n\n" : "") +
            "[Error: " +
            (error.message || "Connection failed") +
            "]";
          streamBubble.textContent = assistantMsg.text;
        } else {
          conv.messages.push({
            role: "error",
            text:
              error.message ||
              "Could not reach the API. Is the server running on port 8000?",
          });
        }
      } finally {
        activeAbortController = null;
        setGenerating(false);
        if (!streamingStarted) {
          renderChat();
        }
        renderHistoryList();
        scrollToBottom();
        input.focus();
      }
    }

    input.addEventListener("input", autoResize);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      sendMessage(input.value);
    });

    stopBtn.addEventListener("click", stopGeneration);

    function showUploadError(message, fromDocuments) {
      if (fromDocuments) {
        setDocumentsStatus(message, "error");
      } else {
        addChatMessage("error", message);
      }
    }

    function inferVendorFromFilename(fileName) {
      const lower = (fileName || "").toLowerCase();
      for (const slug of UPLOAD_VENDOR_SLUGS) {
        if (lower.includes(slug)) {
          return slug;
        }
      }
      return "other";
    }

    let uploadModalResolver = null;

    function showUploadMetadataModal(file) {
      return new Promise((resolve) => {
        const name = file.name || "document";
        uploadModalFilename.textContent = name;
        uploadVendorSelect.value = inferVendorFromFilename(name);
        uploadDocTypeSelect.value = "user_manual";
        uploadProductLineInput.value = "";
        uploadSoftwareVersionInput.value = "";
        uploadModalResolver = resolve;
        uploadModal.classList.add("is-open");
        uploadModal.setAttribute("aria-hidden", "false");
        uploadProductLineInput.focus();
      });
    }

    function hideUploadMetadataModal(result) {
      uploadModal.classList.remove("is-open");
      uploadModal.setAttribute("aria-hidden", "true");
      if (uploadModalResolver) {
        uploadModalResolver(result);
        uploadModalResolver = null;
      }
    }

    function confirmUploadMetadata() {
      const productLine = uploadProductLineInput.value.trim();
      const softwareVersion = uploadSoftwareVersionInput.value.trim();
      hideUploadMetadataModal({
        vendor: uploadVendorSelect.value,
        document_type: uploadDocTypeSelect.value,
        product_line: productLine || undefined,
        software_version: softwareVersion || undefined,
      });
    }

    function cancelUploadMetadata() {
      hideUploadMetadataModal(null);
    }

    async function uploadFile(file, options = {}) {
      const { fromDocuments = false, metadata = null } = options;
      if (!file || isLoading || !metadata) return;

      const name = file.name || "document";
      const ext = name.includes(".") ? name.slice(name.lastIndexOf(".")).toLowerCase() : "";
      if (ext !== ".pdf" && ext !== ".txt") {
        showUploadError("Only PDF and TXT files are supported.", fromDocuments);
        return;
      }

      if (fromDocuments) {
        openDocumentsPanel();
        setDocumentsStatus("Uploading " + name + "…", "");
      }

      try {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("vendor", metadata.vendor);
        formData.append("document_type", metadata.document_type);
        if (metadata.product_line) {
          formData.append("product_line", metadata.product_line);
        }
        if (metadata.software_version) {
          formData.append("software_version", metadata.software_version);
        }

        const response = await apiFetch(UPLOAD_URL, {
          method: "POST",
          body: formData,
          promptApiKeyOn401: true,
        });

        if (!response.ok) {
          let detail = "Upload failed (" + response.status + ")";
          try {
            const err = await response.json();
            detail = err.detail || detail;
          } catch (_) {}
          showUploadError("Failed to upload " + name + ": " + detail, fromDocuments);
        } else {
          const data = await response.json();
          if (data.job_id) {
            if (fromDocuments) {
              setDocumentsStatus("", "");
            }
            startIngestPolling(data.job_id, data.filename || name);
          } else {
            showUploadError(
              "Upload succeeded but no job ID was returned.",
              fromDocuments
            );
          }
        }
      } catch (error) {
        showUploadError(
          "Failed to upload " + name + ": " + (error.message || "Network error"),
          fromDocuments
        );
      } finally {
        if (fromDocuments) {
          docFileInput.value = "";
        } else {
          fileInput.value = "";
          input.focus();
        }
      }
    }

    async function uploadFilesFromDocuments(fileList) {
      if (!fileList || !fileList.length || isLoading) return;
      openDocumentsPanel();
      for (const file of fileList) {
        const metadata = await showUploadMetadataModal(file);
        if (!metadata) {
          docFileInput.value = "";
          continue;
        }
        await uploadFile(file, { fromDocuments: true, metadata });
      }
    }

    async function promptAndUploadFile(file, fromDocuments) {
      const metadata = await showUploadMetadataModal(file);
      if (!metadata) {
        if (fromDocuments) {
          docFileInput.value = "";
        } else {
          fileInput.value = "";
        }
        return;
      }
      await uploadFile(file, { fromDocuments, metadata });
    }

    attachBtn.addEventListener("click", () => {
      if (!isLoading) {
        fileInput.click();
      }
    });

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if (file) {
        promptAndUploadFile(file, false);
      }
    });

    uploadModalCancel.addEventListener("click", cancelUploadMetadata);
    uploadModalConfirm.addEventListener("click", confirmUploadMetadata);
    uploadModal.addEventListener("click", (e) => {
      if (e.target === uploadModal) {
        cancelUploadMetadata();
      }
    });

    function displayFilename(source) {
      return (source || "")
        .replace(/^data[/\\]/i, "")
        .split(/[/\\]/)
        .pop();
    }

    function setDocumentsStatus(message, type) {
      documentsStatus.textContent = message;
      documentsStatus.className =
        "documents-status" + (type ? " " + type : "");
    }

    function groupDocumentsByVendor(documents) {
      const groups = new Map();
      for (const doc of documents) {
        const vendor = (doc.vendor || "other").toLowerCase();
        if (!groups.has(vendor)) {
          groups.set(vendor, []);
        }
        groups.get(vendor).push(doc);
      }
      return Array.from(groups.entries()).sort((a, b) =>
        a[0].localeCompare(b[0])
      );
    }

    function formatIngestedAt(timestamp) {
      if (!timestamp) return "";
      try {
        const date = new Date(timestamp);
        if (Number.isNaN(date.getTime())) return "";
        return date.toLocaleDateString();
      } catch (_) {
        return "";
      }
    }

    let documentsCache = [];

    function renderDocumentsList(documents) {
      documentsList.innerHTML = "";
      const vendorFilter = documentsVendorFilter
        ? documentsVendorFilter.value
        : "";
      const visible = vendorFilter
        ? (documents || []).filter(
            (doc) => (doc.vendor || "").toLowerCase() === vendorFilter
          )
        : documents || [];
      if (!visible || visible.length === 0) {
        const empty = document.createElement("div");
        empty.className = "documents-empty";
        empty.textContent = vendorFilter
          ? "No documents for this vendor"
          : "No documents ingested yet";
        documentsList.appendChild(empty);
        return;
      }

      const grouped = groupDocumentsByVendor(visible);
      const showVendorHeaders = grouped.length > 1;

      for (const [vendor, docs] of grouped) {
        if (showVendorHeaders) {
          const header = document.createElement("div");
          header.className = "document-vendor-header";
          header.textContent = vendor;
          documentsList.appendChild(header);
        }

        for (const doc of docs) {
          const row = document.createElement("div");
          row.className = "document-row";
          row.dataset.source = doc.source;

          const info = document.createElement("div");
          info.className = "document-info";

          const name = document.createElement("div");
          name.className = "document-name";
          name.textContent = doc.file_name || displayFilename(doc.source);
          name.title = doc.source;

          const chunks = document.createElement("div");
          chunks.className = "document-chunks";
          const totalLabel =
            doc.total_chunks && doc.total_chunks !== doc.chunks
              ? doc.chunks + " / " + doc.total_chunks + " chunks"
              : doc.chunks + " chunks";
          chunks.textContent = totalLabel;

          const meta = document.createElement("div");
          meta.className = "document-meta-line";
          const metaParts = [];
          if (!showVendorHeaders && doc.vendor) {
            metaParts.push(doc.vendor);
          }
          if (doc.document_type) {
            metaParts.push(doc.document_type);
          }
          const ingested = formatIngestedAt(doc.ingestion_timestamp);
          if (ingested) {
            metaParts.push("ingested " + ingested);
          }
          meta.textContent = metaParts.join(" · ");

          info.appendChild(name);
          info.appendChild(chunks);
          if (meta.textContent) {
            info.appendChild(meta);
          }

          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.className = "document-delete-btn";
          deleteBtn.textContent = "Delete";
          deleteBtn.addEventListener("click", () => {
            deleteDocumentBySource(doc.source);
          });

          row.appendChild(info);
          row.appendChild(deleteBtn);
          documentsList.appendChild(row);
        }
      }
    }

    async function loadDocuments() {
      documentsRefreshBtn.disabled = true;
      setDocumentsStatus("Loading…", "");

      try {
        const response = await apiFetch(DOCUMENTS_URL);
        if (!response.ok) {
          let detail = "Failed to load documents";
          try {
            const err = await response.json();
            detail = err.detail || detail;
          } catch (_) {}
          setDocumentsStatus(detail, "error");
          return;
        }
        const data = await response.json();
        documentsLoaded = true;
        documentsCache = data.documents || [];
        updateDocumentsVendorFilter(documentsCache);
        renderDocumentsList(documentsCache);
        setDocumentsStatus("", "");
      } catch (error) {
        setDocumentsStatus(
          error.message || "Could not reach the API.",
          "error"
        );
      } finally {
        documentsRefreshBtn.disabled = false;
      }
    }

    async function deleteDocumentBySource(source) {
      if (!source || isDeletingDoc || isLoading) return;

      isDeletingDoc = true;
      documentsList
        .querySelectorAll(".document-delete-btn, .doc-delete-btn")
        .forEach((btn) => {
          btn.disabled = true;
        });
      setDocumentsStatus("Deleting…", "");

      try {
        const response = await apiFetch(INGEST_URL, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ file_path: source }),
          promptApiKeyOn401: true,
        });

        if (!response.ok) {
          let detail = "Delete failed";
          try {
            const err = await response.json();
            detail = err.detail || detail;
          } catch (_) {}
          setDocumentsStatus(detail, "error");
        } else {
          const data = await response.json();
          const row = documentsList.querySelector(
            '[data-source="' + CSS.escape(source) + '"]'
          );
          if (row) row.remove();
          if (!documentsList.querySelector(".document-row")) {
            renderDocumentsList([]);
          }
          setDocumentsStatus(
            "Deleted — " + data.deleted + " chunks removed",
            "success"
          );
        }
      } catch (error) {
        setDocumentsStatus(
          error.message || "Could not reach the API.",
          "error"
        );
      } finally {
        isDeletingDoc = false;
        documentsList
          .querySelectorAll(".document-delete-btn")
          .forEach((btn) => {
            btn.disabled = false;
          });
        documentsAddBtn.disabled = isLoading;
      }
    }

    documentsToggle.addEventListener("click", () => {
      documentsOpen = !documentsOpen;
      documentsPanel.classList.toggle("open", documentsOpen);
      documentsBody.hidden = !documentsOpen;
      if (documentsOpen) {
        loadDocuments();
      }
    });

    documentsRefreshBtn.addEventListener("click", loadDocuments);
    if (documentsVendorFilter) {
      documentsVendorFilter.addEventListener("change", () => {
        renderDocumentsList(documentsCache);
      });
    }

    documentsAddBtn.addEventListener("click", () => {
      if (!isLoading) {
        docFileInput.click();
      }
    });

    docFileInput.addEventListener("change", () => {
      if (docFileInput.files && docFileInput.files.length) {
        uploadFilesFromDocuments(Array.from(docFileInput.files));
      }
    });

    documentsDropzone.addEventListener("click", () => {
      if (!isLoading) {
        docFileInput.click();
      }
    });

    documentsDropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      documentsDropzone.classList.add("dragover");
    });

    documentsDropzone.addEventListener("dragleave", () => {
      documentsDropzone.classList.remove("dragover");
    });

    documentsDropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      documentsDropzone.classList.remove("dragover");
      if (e.dataTransfer && e.dataTransfer.files.length) {
        uploadFilesFromDocuments(Array.from(e.dataTransfer.files));
      }
    });

    newChatBtn.addEventListener("click", startNewChat);

    searchInput.addEventListener("input", renderHistoryList);

    settingsBtn.addEventListener("click", showApiKeyModal);

    apiKeyCancel.addEventListener("click", hideApiKeyModal);

    apiKeySubmit.addEventListener("click", saveApiKeyFromModal);

    apiKeyInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        saveApiKeyFromModal();
      }
    });

    if (chatVendorSelect) {
      chatVendorSelect.addEventListener("change", () => {
        const vendor = chatVendorSelect.value || "";
        setChatFilter(vendor, "");
      });
    }
    if (chatProductSelect) {
      chatProductSelect.addEventListener("change", () => {
        setChatFilter(chatFilter.vendor, chatProductSelect.value || "");
      });
    }
    if (filterClearBtn) {
      filterClearBtn.addEventListener("click", clearChatFilter);
    }

    createConversation();
    renderChat();
    renderHistoryList();
    initApp();
    initTtsControls();
    initSttControls();
    loadVendorsCatalog();
  </script>
</body>
</html>
